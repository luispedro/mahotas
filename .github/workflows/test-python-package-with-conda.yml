name: Test mahotas

on: [push]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        numpy-version:
          - '2.0'
          - '2.1'
          - '2.2'
          - '2.3'
          - '2.4'
        exclude:

            # NumPy >2.3+ are too new for Python 3.10
            - python-version: '3.10'
              numpy-version: '2.3'
            - python-version: '3.10'
              numpy-version: '2.4'


            # NumPy 2.0 is too old for Python 3.13
            - python-version: '3.13'
              numpy-version: '2.0'

            # NumPy <=2.3 are too old for Python 3.14
            - python-version: '3.14'
              numpy-version: '2.0'
            - python-version: '3.14'
              numpy-version: '2.1'
            - python-version: '3.14'
              numpy-version: '2.2'
            - python-version: '3.14'
              numpy-version: '2.3'

    steps:
    - uses: actions/checkout@v6
    - uses: mamba-org/setup-micromamba@v2
      with:
        cache-environment: true
        cache-downloads: false
        environment-name: mahotas_test_env
        create-args: python=${{ matrix.python-version }} numpy=${{ matrix.numpy-version }}

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        micromamba install --file tests-requirements.txt --name mahotas_test_env
        micromamba install --name mahotas_test_env freeimage imread
        python -m pip install "meson-python>=0.17.1,<0.18" "meson>=1.2.3" ninja
    - name: Build
      shell: bash -l {0}
      run: |
         make debug
    - name: Test with pytest
      shell: bash -l {0}
      run: |
         python -m pytest -v
